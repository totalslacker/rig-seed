# Example GitHub Actions workflow: lint markdown files.
# Copy this file to .github/workflows/lint-markdown.yml in your forked repo.
#
# Requires: add a .markdownlint.json config or use defaults.

name: Lint Markdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
