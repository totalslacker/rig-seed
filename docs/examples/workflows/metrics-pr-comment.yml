name: Evolution Metrics on PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git-based metrics

      - name: Run metrics
        id: metrics
        run: |
          chmod +x metrics.sh
          # Capture both human-readable and machine-readable output
          METRICS_HUMAN=$(./metrics.sh 2>/dev/null || echo "metrics.sh failed")
          METRICS_QUIET=$(./metrics.sh -q 2>/dev/null || echo "error=true")
          echo "human<<METRICS_EOF" >> "$GITHUB_OUTPUT"
          echo "$METRICS_HUMAN" >> "$GITHUB_OUTPUT"
          echo "METRICS_EOF" >> "$GITHUB_OUTPUT"
          # Extract key values for the summary line
          DAY_COUNT=$(echo "$METRICS_QUIET" | grep '^day_count=' | cut -d= -f2)
          SESSION_COUNT=$(echo "$METRICS_QUIET" | grep '^session_count=' | cut -d= -f2)
          ROADMAP_PCT=$(echo "$METRICS_QUIET" | grep '^roadmap_pct=' | cut -d= -f2)
          echo "summary=Day ${DAY_COUNT:-?} | ${SESSION_COUNT:-?} sessions | Roadmap ${ROADMAP_PCT:-?}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- rig-seed-metrics -->';
            const body = `${marker}
            ## Evolution Metrics

            > ${process.env.SUMMARY}

            <details>
            <summary>Full metrics output</summary>

            \`\`\`
            ${process.env.METRICS}
            \`\`\`

            </details>

            *Updated by [metrics-pr-comment](../blob/main/docs/examples/workflows/metrics-pr-comment.yml) workflow*`;

            // Find existing comment to update (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          METRICS: ${{ steps.metrics.outputs.human }}
          SUMMARY: ${{ steps.metrics.outputs.summary }}
