# rig-seed evolution configuration
# This file controls how the autonomous evolution process runs.

[schedule]
interval = "24h"               # How often evolution cycles run (default: once daily)

[limits]
max_improvements_per_session = 3   # Max improvements per evolution cycle
bootstrap_days = 3                 # Days focused on infrastructure before features

[github]
fetch_issues = true            # Pull GitHub issues into evolution context
issue_label = "agent-input"    # Only fetch issues with this label

[release]
strategy = "manual"            # "manual" (human runs release.sh), "per-session" (tag after every session), "milestone" (tag when roadmap milestone completes)
tag_prefix = "v"               # Prefix for version tags (e.g., "v" → v0.1.0)
default_bump = "patch"         # Default semver bump: "major", "minor", or "patch"
push_tags = true               # Push tags to remote after creating them

[merge]
strategy = "refinery"          # "refinery" (auto-merge), "pr" (human reviews PR), "hybrid" (auto for small, PR for large)
# require_approval = true      # PR-based: require approval before merge
# require_ci = true            # PR-based: require CI green before merge
# pr_threshold = 3             # Hybrid: require PR if more than N files changed
# pr_labels = ["breaking", "security", "deps"]  # Hybrid: require PR for these labels

[safety]
max_fix_attempts = 3           # Revert after N failed build attempts
revert_on_failure = true       # Revert all changes if build fails after max attempts
